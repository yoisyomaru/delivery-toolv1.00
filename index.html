<main>
    <section id="home">
        <div class="card" id="sizeConversion">
            <h2>📦 サイズ換算</h2>
            <input type="number" id="sizeInput" placeholder="サイズを入力">
            <p>170サイズ: <span id="sizeOutput">0</span></p>
        </div>
        <div class="card" id="volumeConversion">
            <h2>📐 才数換算</h2>
            <input type="number" id="lengthInput" placeholder="縦の長さ">
            <input type="number" id="widthInput" placeholder="横の長さ">
            <input type="number" id="heightInput" placeholder="高さ">
            <p>体積: <span id="volumeOutput">0</span>㎤</p>
            <p>才数: <span id="tasuOutput">0</span>才</p>
        </div>
        <div class="card" id="barcodeGenerator">
            <h2>🏷 NW-7バーコード</h2>
            <input type="text" id="barcodeInput" placeholder="数字を入力">
            <div id="barcodeDisplay"></div>
        </div>
        <div class="card" id="settings">
            <h2>⚙ 設定</h2>
            <button id="clearHistory">履歴をクリア</button>
            <button id="clearPresets">プリセットをクリア</button>
        </div>
    </section>
</main>
