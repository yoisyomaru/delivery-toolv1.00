<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#007AFF" />

  <title>Delivery Tool Ver.1.01</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>

<body>
  <div class="app">

    <header class="app-header">
      <div class="brand">
        <span class="brand-icon">📦</span>
        <h1>Delivery Tool Ver.1.01</h1>
      </div>

      <button id="themeToggle" class="theme-btn">🌙 ダーク</button>
    </header>

    <section id="homeScreen" class="home-screen">
      <h2>機能を選択してください</h2>

      <div class="home-grid">
        <button class="home-card" data-target="sizePage">
          <div class="home-icon blue">📏</div>
          <h3>サイズ換算</h3>
          <p>配送サイズを計算します</p>
        </button>

        <button class="home-card" data-target="tasuPage">
          <div class="home-icon green">📦</div>
          <h3>才数換算</h3>
          <p>体積から才数を計算します</p>
        </button>

        <button class="home-card" data-target="barcodePage">
          <div class="home-icon purple">|||||</div>
          <h3>バーコード生成</h3>
          <p>NW-7バーコードを生成します</p>
        </button>
      </div>
    </section>

    <nav class="tab-nav">
      <button class="tab-btn active" data-target="sizePage">📏 サイズ換算</button>
      <button class="tab-btn" data-target="tasuPage">📦 才数換算</button>
      <button class="tab-btn" data-target="barcodePage">||||| バーコード生成</button>
    </nav>

    <main class="content">

      <section id="sizePage" class="page active">
        <div class="card">
          <h2>三辺合計</h2>
          <p class="help">サイズ（cm）の合計を入力してください。</p>

          <div class="input-wrap">
            <input id="sizeInput" type="number" inputmode="numeric" placeholder="例：333" />
            <span>cm</span>
          </div>

          <div id="sizeOutput" class="result-box">サイズ：0</div>
        </div>

        <div class="card">
          <h2>縦・横・奥行き</h2>
          <p class="help">縦・横・奥行き（cm）を入力してください。</p>

          <div class="three-inputs">
            <input id="sizeLengthInput" type="number" inputmode="numeric" placeholder="縦（cm）" />
            <input id="sizeWidthInput" type="number" inputmode="numeric" placeholder="横（cm）" />
            <input id="sizeDepthInput" type="number" inputmode="numeric" placeholder="奥行き（cm）" />
          </div>

          <div id="sizeTotalOutput" class="result-box">
            合計サイズ：0cm ／ サイズ：0
          </div>
        </div>
      </section>

      <section id="tasuPage" class="page">
        <div class="card">
          <h2>才数換算</h2>
          <p class="help">縦・横・高さ（cm）を入力してください。</p>

          <div class="three-inputs">
            <input id="lengthInput" type="number" inputmode="numeric" placeholder="縦（cm）" />
            <input id="widthInput" type="number" inputmode="numeric" placeholder="横（cm）" />
            <input id="heightInput" type="number" inputmode="numeric" placeholder="高さ（cm）" />
          </div>

          <div id="volumeOutput" class="result-box">体積：0㎤</div>
          <div id="tasuOutput" class="result-box">才数：0才</div>
        </div>
      </section>

      <section id="barcodePage" class="page">
        <div class="card">
          <h2>NW-7バーコード生成</h2>
          <p class="help">数字のみ入力してください。</p>
          <p class="notice">※必ず4桁で入力（例：5㎏→0005）</p>

          <div class="slider-area">
  <label for="barcodeSizeSlider">
    バーコードの大きさ：<span id="barcodeSizeValue">2</span>
  </label>
  <input
    id="barcodeSizeSlider"
    type="range"
    min="1"
    max="5"
    step="1"
    value="2"
  />
</div>

          <input id="barcodeInput" type="number" inputmode="numeric" placeholder="例：0005" />

          <div class="barcode-area">
            <svg id="barcode"></svg>
          </div>
<input id="presetNameInput" type="text" placeholder="プリセット名（例：5kg）" />
          <button id="savePreset" class="primary-btn">⭐ プリセット登録</button>
<button id="downloadBarcode" class="primary-btn secondary-btn">
  💾 PNG保存
</button>
<button id="fullscreenBarcode" class="primary-btn secondary-btn">
  ⛶ 全画面表示
</button>
          <h3 class="sub-title">プリセット</h3>
          <div id="presetList" class="preset-list"></div>
          <h3 class="sub-title">履歴</h3>

<div id="historyList" class="history-list"></div>
        </div>
      </section>

    </main>

  </div>
<div id="barcodeModal" class="barcode-modal">
  <button id="closeModal" class="close-modal">×</button>
  <div class="modal-content">
    <svg id="fullscreenSvg"></svg>
  </div>
</div>
  <script src="app.js"></script>
  <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./service-worker.js");
    });
  }
</script>
</body>
</html>
